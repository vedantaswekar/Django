
<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Managment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
  <body>
    <div class="container">
  <!-- Content here -->
   <h1>Add An Student!!!</h1>
   <hr>

   <form action="/add_std" method="post">
    {% csrf_token %}
  <div class="mb-3">
    <label for="first_name">FIRST NAME</label><br>
    <input type="text"  id="first_name" name="first_name" value="{{first_name}}"><br>
    <label for="last_name">LAST NAME</label><br>
    <input type="text"  id="last_name" name="last_name" value="{{last_name}}"><br>
      <label for="dept">DEPARTMENT</label><br>
    <select name="dept">
      <option>Computer</option>
      <option>Mechanical</option>
      <option>Civil</option>
    </select><br>
      <label for="Roll_No">Roll No</label><br>
    <input type="number"  id="Roll_No" name="Roll_No" value="{{Roll_No}}"><br>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
          
  </body>
</html>
